<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Quran Search</title>
<style>
body {
  font-family: sans-serif;
  background: #111;
  color: #eee;
  padding: 20px;
}
input, button {
  padding: 10px;
  font-size: 16px;
}
.result {
  margin: 10px 0;
  cursor: pointer;
  color: #4ea1ff;
}
.ayah {
  margin: 8px 0;
  padding: 6px;
}
mark {
  background: gold;
  color: black;
  padding: 2px 4px;
}
</style>
</head>

<body>

<h2>Quran Advanced Search</h2>

<input id="q" placeholder="Search (الله)" />
<button onclick="search()">Search</button>

<hr />

<div id="results"></div>

<hr />

<div id="surah"></div>

<script>
const API = "http://localhost:8000";

async function search() {
  const q = document.getElementById("q").value;
  const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}&limit=20`);
  const data = await res.json();

  const box = document.getElementById("results");
  box.innerHTML = "<h3>Results</h3>";

  data.forEach(r => {
    const d = document.createElement("div");
    d.className = "result";
    d.innerText = `Surah ${r.surah} : Ayah ${r.ayah}`;
    d.onclick = () => loadSurah(r.surah, r.ayah);
    box.appendChild(d);
  });
}

async function loadSurah(surah, ayah) {
  const res = await fetch(`${API}/surah/${surah}?highlight_ayah=${ayah}`);
  const data = await res.json();

  const box = document.getElementById("surah");
  box.innerHTML = `<h3>Surah ${surah}</h3>`;

  data.verses.forEach(v => {
    const d = document.createElement("div");
    d.className = "ayah";
    d.id = `ayah-${v.ayah}`;
    d.innerHTML = `<b>${v.ayah}</b> — ${v.arabic}`;
    box.appendChild(d);
  });

  setTimeout(() => {
    const el = document.getElementById(`ayah-${ayah}`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
  }, 300);
}
</script>

</body>
</html>
